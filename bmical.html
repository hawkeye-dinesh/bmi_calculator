<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple BMI Calculator</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .calculator { border: 1px solid #ccc; padding: 20px; border-radius: 8px; width: 300px; }
        input, button { width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box; }
        button { background-color: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="calculator">
        <h2>BMI Calculator</h2>
        <label>Height (m):</label>
        <input type="number" id="height" step="0.01" placeholder="1.75">
        <label>Weight (kg):</label>
        <input type="number" id="weight" step="0.1" placeholder="70">
        <button onclick="calculateBMI()">Calculate</button>
        <div id="result"></div>
    </div>

    <script>
        function calculateBMI() {
            const h = parseFloat(document.getElementById("height").value);
            const w = parseFloat(document.getElementById("weight").value);
            if (h > 0 && w > 0) {
                // BMI formula: weight (kg) / (height (m) * height (m))
                const bmi = (w / (h * h)).toFixed(1);
                document.getElementById("result").innerHTML = "BMI: " + bmi;
            } else {
                alert("Please enter valid numbers");
            }
        }
    </script>
</body>
</html>
